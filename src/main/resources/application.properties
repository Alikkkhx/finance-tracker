# ========================================
# Smart Expense Analyzer - Configuration
# ========================================

spring.application.name=Smart Expense Analyzer

# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:smart_expense_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# H2 Console (available at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Schema initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Socket server port
app.socket.port=5555

# Thread pool settings
app.thread.pool-size=3
app.thread.analysis-interval=60
app.thread.budget-monitor-interval=30
