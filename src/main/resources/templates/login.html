<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart Expense Analyzer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-circle">💰</div>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to Smart Expense Analyzer</p>
        </div>

        <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>
        <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Create one</a>
        </div>
    </div>
</div>
</body>
</html>
