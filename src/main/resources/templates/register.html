<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Smart Expense Analyzer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-circle">🚀</div>
            <h2>Create Account</h2>
            <p class="auth-subtitle">Start analyzing your finances</p>
        </div>

        <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

        <form method="post" th:action="@{/register}">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
